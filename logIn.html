<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Utsho Courier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        min-height: 100vh;
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-6">
    <div
      class="w-full max-w-md bg-white/10 backdrop-blur-lg border border-white/20 p-10 rounded-3xl shadow-2xl"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white">
          Utsho <span class="text-orange-400">Courier</span>
        </h1>
        <p class="text-blue-100 text-sm mt-2">আপনার অ্যাকাউন্টে লগইন করুন</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-white text-sm font-medium mb-1 ml-1"
            >ইমেইল ঠিকানা</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-200"
            >
              <i class="fas fa-envelope"></i>
            </span>
            <input
              type="email"
              id="email"
              required
              placeholder="example@mail.com"
              class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/10 rounded-xl text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-orange-400 transition"
            />
          </div>
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-1 ml-1"
            >পাসওয়ার্ড</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-200"
            >
              <i class="fas fa-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-3 bg-white/20 border border-white/10 rounded-xl text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-orange-400 transition"
            />
            <span
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-blue-200 cursor-pointer hover:text-white"
              onclick="togglePassword()"
            >
              <i id="eyeIcon" class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <div
          class="flex items-center justify-between text-xs text-blue-100 px-1"
        >
          <label class="flex items-center cursor-pointer">
            <input type="checkbox" class="mr-2 accent-orange-400" /> মনে রাখুন
          </label>
          <a href="#" class="hover:text-orange-400 transition"
            >পাসওয়ার্ড ভুলে গেছেন?</a
          >
        </div>

        <button
          type="submit"
          class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 shadow-lg hover:shadow-orange-500/30 transition-all active:scale-95"
        >
          Login <i class="fas fa-sign-in-alt ml-2"></i>
        </button>
      </form>

      <div class="mt-8">
        <div class="relative flex items-center justify-center mb-6">
          <div class="border-t border-white/10 w-full"></div>
          <span
            class="absolute bg-transparent px-3 text-xs text-blue-200 uppercase tracking-widest"
            >Or login with</span
          >
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button
            class="flex items-center justify-center py-2 bg-white/5 border border-white/10 rounded-xl text-white hover:bg-white/10 transition"
          >
            <i class="fab fa-google mr-2 text-red-400"></i> Google
          </button>
          <button
            class="flex items-center justify-center py-2 bg-white/5 border border-white/10 rounded-xl text-white hover:bg-white/10 transition"
          >
            <i class="fab fa-facebook mr-2 text-blue-400"></i> Facebook
          </button>
        </div>
      </div>

      <p class="text-center text-blue-100 text-sm mt-8">
        নতুন ইউজার?
        <a href="#" class="text-orange-400 font-bold hover:underline"
          >রেজিস্ট্রেশন করুন</a
        >
      </p>
    </div>

    <script src="logIn.js"></script>
  </body>
</html>
